<!DOCTYPE html>
<html>
<head>
    <title>AI Word Predictor Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="chat-container">

        <div class="chat-header">
            AI Next Word Predictor
        </div>

        <div class="chat-box" id="chatBox">
            <div class="bot-message">
                Start typing below and I’ll predict the next word.
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="textInput" 
                placeholder="Type your message..."
                onkeyup="predictWord()"
            >
        </div>

        <div class="suggestions" id="result"></div>

    </div>

    <script>
        async function predictWord() {
            let text = document.getElementById("textInput").value;

            if (text.trim() === "") {
                document.getElementById("result").innerHTML = "";
                return;
            }

            let response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text: text })
            });

            let data = await response.json();

            let suggestionsHTML = "";

            data.prediction.forEach(word => {
                suggestionsHTML += `
                    <button class="chip" onclick="addWord('${word}')">
                        ${word}
                    </button>
                `;
            });

            document.getElementById("result").innerHTML = suggestionsHTML;
        }

        function addWord(word) {
            let input = document.getElementById("textInput");
            input.value += " " + word;
            predictWord();
        }
    </script>

</body>
</html>
